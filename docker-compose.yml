services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: agent_pulsar
      POSTGRES_USER: agent_pulsar
      POSTGRES_PASSWORD: agent_pulsar
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_pulsar"]
      interval: 5s
      timeout: 3s
      retries: 3
    volumes:
      - pgdata:/var/lib/postgresql/data

  openclaw:
    image: alpine/openclaw:latest
    ports:
      - "18789:18789"
      - "18790:18790"
    environment:
      - OPENCLAW_GATEWAY_PORT=18789
      - OPENCLAW_BRIDGE_PORT=18790
      - OPENCLAW_GATEWAY_BIND=lan
      - TELEGRAM_BOT_TOKEN=${AP_TELEGRAM_BOT_TOKEN:-}
    volumes:
      - openclaw_home:/home/user
      - ./skills/agent-pulsar:/workspace/skills/agent-pulsar:ro
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
  openclaw_home:
